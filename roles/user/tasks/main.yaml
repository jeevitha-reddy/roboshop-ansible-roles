- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup

- name: node js setup
  ansible.builtin.import_role:
    name: common
    tasks_from: node js

- name: mongodb setup
  ansible.builtin.import_role:
    name: common
    tasks_from: mongodb-setup 

- name: systemctl  start
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd